name: colocated-test-check
on:
  pull_request:
    branches: [dev, master]
  push:
    branches: [dev, master]
concurrency:
  group: colocated-test-check-${{ github.ref }}
  cancel-in-progress: true
jobs:
  colocated-test-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm check:colocated
